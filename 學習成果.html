<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI x Music x Visual Portfolio</title>
    <style>
        /* 基礎設定：暗黑與科技感色調 */
        :root {
            --mc-gray: #313131;
            --mc-light-gray: #C6C6C6;
            --accent-neon: #00FF41; /* 螢光綠，可換成你的塗鴉色 */
            --bg-dark: #121212;
        }

        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace; /* 模擬像素/程式感 */
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 頂部標籤列 (Tabs) */
        .nav-tabs {
            display: flex;
            gap: 5px;
            margin-top: 20px;
            width: 90%;
        }

        .tab {
            padding: 10px 20px;
            background-color: var(--mc-gray);
            border: 3px solid #000;
            border-bottom: none;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }

        .tab.active {
            background-color: var(--mc-light-gray);
            color: black;
            border-top: 3px solid var(--accent-neon);
        }

        /* 主內容區域 (Main Inventory Window) */
        .content-window {
            width: 90%;
            height: 70vh;
            background-color: var(--mc-light-gray);
            border: 4px solid #000;
            padding: 20px;
            color: #333;
            overflow-y: auto;
            position: relative;
        }

        /* 作品列表 (World Selection Style) */
        .work-item {
            background: #8B8B8B;
            border: 2px solid #FFF;
            border-right-color: #555;
            border-bottom-color: #555;
            margin-bottom: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .work-item:hover {
            border: 2px solid var(--accent-neon);
            background: #A0A0A0;
        }

        .work-thumb {
            width: 80px;
            height: 80px;
            background: #333; /* 之後放你的專輯封面 */
            border: 2px solid #000;
        }

        .work-info h3 { margin: 0; font-size: 1.2rem; }
        .work-info p { margin: 5px 0 0; font-size: 0.9rem; color: #eee; }

        /* 隱藏內容區塊 */
        .page { display: none; }
        .page.active { display: block; }

        h2 { color: #000; text-shadow: 2px 2px #fff; }

    </style>
</head>
<body>

    <h1 style="margin-top: 40px; color: var(--accent-neon); text-shadow: 3px 3px #000;">
        AI × MUSIC × VISUAL
    </h1>

    <div class="nav-tabs">
        <div class="tab active" onclick="showPage('works')">作品選單 (Works)</div>
        <div class="tab" onclick="showPage('concept')">創作理念 (Concept)</div>
        <div class="tab" onclick="showPage('reflection')">心得反思 (Reflection)</div>
    </div>

    <div class="content-window">
        
        <div id="works" class="page active">
            <h2>Select Project</h2>
            <div class="work-item">
                <div class="work-thumb"></div>
                <div class="work-info">
                    <h3>L0S1NG FUR</h3>
                    <p>AI 視覺整合 x 音樂製作 | 跨領域作品</p>
                </div>
            </div>
            <div class="work-item">
                <div class="work-thumb"></div>
                <div class="work-info">
                    <h3>Epic Die</h3>
                    <p>Album Project | Cinematic x Rage Style</p>
                </div>
            </div>
        </div>

        <div id="concept" class="page">
            <h2>Creative Concept</h2>
            <p>這裡將放置關於「街頭塗鴉」、「AI 應用」與「音樂結合」的核心說明...</p>
        </div>

        <div id="reflection" class="page">
            <h2>Reflection & Growth</h2>
            <p>這裡將紀錄你如何透過 AI 提升效率，以及在解決技術問題中的成長...</p>
        </div>

    </div>

    <script>
        function showPage(pageId) {
            // 隱藏所有頁面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // 取消所有 Tab 的 Active 狀態
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            // 顯示指定頁面
            document.getElementById(pageId).classList.add('active');
            // 找到對應的 Tab 並加上 Active (這裡簡單處理)
            event.currentTarget.classList.add('active');
        }
    </script>

</body>
</html>
